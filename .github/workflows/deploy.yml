name: Deploy

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ['CI']
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '24'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: >-
      ${{
        (github.event_name == 'push' && 'production') ||
        (github.event_name == 'workflow_run' && 'staging') ||
        github.event.inputs.environment
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint


      - name: Run tests
        run: npm run test:run
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh # Or use swb-infra shared action
        with:
          host: ${{ vars.SSH_HOST }}
          private-key: ${{ secrets.SSH_KEY }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}

      - name: Validate deployment variables
        run: |
          if [ -z "${{ vars.INFRA_DIR }}" ]; then
            echo "Error: INFRA_DIR GitHub variable is not set"
            exit 1
          fi
          if [ -z "${{ vars.HTML_DIR }}" ]; then
            echo "Error: HTML_DIR GitHub variable is not set"
            exit 1
          fi
          echo "INFRA_DIR: ${{ vars.INFRA_DIR }}"
          echo "HTML_DIR: ${{ vars.HTML_DIR }}"

      - name: Deploy to remote
        env:
          INFRA_DIR: ${{ vars.INFRA_DIR }}
          HTML_DIR: ${{ vars.HTML_DIR }}
        run: |
          # Create target directory for static files
          ssh server <<EOF
            mkdir -p $INFRA_DIR/nginx/html/$HTML_DIR
          EOF

          # Copy built files to server and remove stale assets
          rsync -avz --delete -e 'ssh' dist/ server:$INFRA_DIR/nginx/html/$HTML_DIR/
